<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>En-G-ineer: Origin Story — George Megally Girgis</title>
<meta name="description" content="An interactive engineering portfolio: five years of Mechatronics Engineering as a playable retro game.">
<style>
  :root{ --ink:#e8e0c8; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; background:#08080c; overflow:hidden; touch-action:none;
    font-family:"Courier New",Courier,monospace; }
  #stage{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; }
  #bar{ width:100%; display:flex; justify-content:center; gap:8px; padding:6px 8px; z-index:30; }
  .pbtn{ font-family:inherit; font-weight:bold; font-size:12px; letter-spacing:1px; cursor:pointer;
    color:var(--ink); background:#1a1a26; border:2px solid #55506a; border-radius:0;
    padding:5px 10px; box-shadow:2px 2px 0 #000; text-transform:uppercase; user-select:none; }
  .pbtn:active{ transform:translate(2px,2px); box-shadow:none; }
  #skipBtn{ border-color:#e8c832; color:#e8c832; }
  #cwrap{ flex:1; width:100%; display:flex; align-items:center; justify-content:center; min-height:0; }
  canvas#game{ image-rendering:pixelated; image-rendering:crisp-edges; background:#000;
    box-shadow:0 0 0 2px #222, 0 0 40px #000; }
  /* ---- touch controls ---- */
  #touch{ display:none; position:fixed; left:0; right:0; bottom:0; height:150px; z-index:40;
    pointer-events:none; }
  body.touchy #touch{ display:block; }
  .tbtn{ position:absolute; pointer-events:auto; background:#1a1a26cc; border:2px solid #55506a;
    color:var(--ink); font-family:inherit; font-weight:bold; display:flex; align-items:center;
    justify-content:center; font-size:18px; user-select:none; }
  .tbtn:active{ background:#3a3a52cc; }
  #tUp{ left:58px; bottom:96px; width:44px; height:44px; }
  #tDown{ left:58px; bottom:8px; width:44px; height:44px; }
  #tLeft{ left:12px; bottom:52px; width:44px; height:44px; }
  #tRight{ left:104px; bottom:52px; width:44px; height:44px; }
  #tA{ right:20px; bottom:34px; width:72px; height:72px; border-radius:50%; font-size:13px;
    border-color:#e8c832; color:#e8c832; }
  /* ---- photo viewer overlay ---- */
  #pv{ display:none; position:fixed; inset:0; z-index:50; background:#000000d8;
    align-items:center; justify-content:center; padding:12px; }
  #pv.open{ display:flex; }
  #pvFrame{ background:#14141e; border:4px solid #d8b048; outline:4px solid #201808;
    box-shadow:0 0 0 8px #0006, 8px 8px 0 #000; max-width:min(92vw,760px); max-height:92vh;
    display:flex; flex-direction:column; position:relative; }
  #pvHead{ background:#d8b048; color:#201808; font-weight:bold; font-size:13px; letter-spacing:1px;
    padding:5px 34px 5px 8px; text-transform:uppercase; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; }
  #pvImgBox{ position:relative; background:#000; min-height:120px; overflow:hidden; }
  #pvImg{ display:block; max-width:100%; max-height:56vh; margin:0 auto; }
  #pvScan{ position:absolute; inset:0; pointer-events:none; opacity:.28;
    background:repeating-linear-gradient(0deg,#0000 0 2px,#000 2px 3px); }
  #pvCap{ color:#e8e0c8; font-size:12px; line-height:1.5; padding:8px 10px; max-width:560px; }
  #pvX{ position:absolute; top:2px; right:2px; width:24px; height:24px; background:#201808;
    color:#d8b048; border:2px solid #201808; font-weight:bold; cursor:pointer; font-size:12px; }
  .pvNav{ position:absolute; top:50%; transform:translateY(-50%); width:34px; height:44px;
    background:#14141ecc; color:#d8b048; border:2px solid #d8b048; font-size:18px; cursor:pointer; }
  #pvPrev{ left:4px; } #pvNext{ right:4px; }
  #pvCount{ position:absolute; bottom:4px; right:8px; color:#d8b048; font-size:11px;
    text-shadow:1px 1px 0 #000; }
  /* ---- hire-me CTA overlay (clickable links) ---- */
  #cta{ display:none; position:fixed; z-index:35; flex-direction:column; gap:8px;
    align-items:center; }
  #cta.open{ display:flex; }
  #cta a,#cta button{ display:block; width:250px; text-align:center; text-decoration:none;
    font-family:inherit; font-weight:bold; font-size:13px; letter-spacing:1px; cursor:pointer;
    padding:8px 6px; text-transform:uppercase; background:#1a1a26; color:#e8e0c8;
    border:2px solid #55506a; box-shadow:3px 3px 0 #000; }
  #cta a:active,#cta button:active{ transform:translate(2px,2px); box-shadow:1px 1px 0 #000; }
  #cta .gold{ border-color:#e8c832; color:#e8c832; }
  #cta .cyan{ border-color:#35d0e0; color:#35d0e0; }
</style>
</head>
<body>
<div id="stage">
  <div id="bar">
    <button class="pbtn" id="skipBtn">&#9654; Skip to Gallery</button>
    <button class="pbtn" id="muteBtn">Sound: OFF</button>
  </div>
  <div id="cwrap"><canvas id="game" width="256" height="240"></canvas></div>
</div>

<div id="touch">
  <div class="tbtn" id="tUp">&#9650;</div><div class="tbtn" id="tDown">&#9660;</div>
  <div class="tbtn" id="tLeft">&#9664;</div><div class="tbtn" id="tRight">&#9654;</div>
  <div class="tbtn" id="tA">ACT</div>
</div>

<div id="pv">
  <div id="pvFrame">
    <div id="pvHead">EXHIBIT</div>
    <div id="pvImgBox">
      <img id="pvImg" alt="project image">
      <div id="pvScan"></div>
      <button class="pvNav" id="pvPrev">&#9664;</button>
      <button class="pvNav" id="pvNext">&#9654;</button>
      <div id="pvCount"></div>
    </div>
    <div id="pvCap"></div>
    <button id="pvX">X</button>
  </div>
</div>

<div id="cta">
  <a class="gold" id="ctaMail" href="mailto:george7megally@gmail.com">&#9993; Email me</a>
  <a class="cyan" id="ctaLi" href="https://linkedin.com/in/george-megally-girgis" target="_blank" rel="noopener">&#128188; LinkedIn</a>
  <button class="gold" id="ctaCv">&#9654; View my CV</button>
  <button id="ctaAgain">&#8635; Play again</button>
</div>

const ASSETS = PAYLOAD.ASSETS;   // { face, cv:[], hexapod, conveyor:[], turbine, rc_car:[], pneumatic_arm, dc_motor, comp_intelligence }
const FONTDATA = PAYLOAD.FONT;

/* ============================== CORE ==================================== */
const W=256, H=240;
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

function fit(){
  const wrap=document.getElementById('cwrap');
  const aw=wrap.clientWidth-8, ah=wrap.clientHeight-8;
  let s=Math.min(aw/W, ah/H);
  if(s>=1) s=Math.floor(s*2)/2;           // crisp half-integer steps
  cv.style.width=(W*s)+'px'; cv.style.height=(H*s)+'px';
}
addEventListener('resize',fit);

/* ---------------- bitmap font (proportional) ---------------- */
const fontImg=new Image(); fontImg.src=FONTDATA.img;
const FCELL=FONTDATA.cell, FH=FONTDATA.ch, F0=FONTDATA.first, FWID=FONTDATA.widths;
const FW=6; // average advance, used for layout budgets
const tintCache={};
function fontSheet(color){
  if(tintCache[color]) return tintCache[color];
  const c=document.createElement('canvas'); c.width=fontImg.width; c.height=fontImg.height;
  const x=c.getContext('2d');
  x.drawImage(fontImg,0,0); x.globalCompositeOperation='source-in';
  x.fillStyle=color; x.fillRect(0,0,c.width,c.height);
  tintCache[color]=c; return c;
}
function sanitize(s){
  return String(s).replace(/[\u2014\u2013]/g,'-').replace(/[\u2018\u2019]/g,"'")
    .replace(/[\u201C\u201D]/g,'"').replace(/\u2026/g,'...').replace(/\u00B7/g,'*')
    .replace(/\u2192/g,'->').replace(/[^\x20-\x7E]/g,'');
}
function tw(s,scale){ s=sanitize(s); scale=scale||1; let w=0;
  for(let i=0;i<s.length;i++){ const cc=s.charCodeAt(i); if(cc>=F0&&cc<=126) w+=FWID[cc-F0]; }
  return w*scale;
}
function text(s,x,y,color,scale){
  s=sanitize(s); scale=scale||1; const sh=fontSheet(color||'#fff');
  let px=Math.round(x);
  for(let i=0;i<s.length;i++){
    const cc=s.charCodeAt(i); if(cc<F0||cc>126) continue;
    ctx.drawImage(sh,(cc-F0)*FCELL,0,FCELL,FH, px, y, FCELL*scale, FH*scale);
    px+=FWID[cc-F0]*scale;
  }
}
function textC(s,cx,y,color,scale){ scale=scale||1; text(s, Math.round(cx - tw(s,scale)/2), y, color, scale); }
function wrap(s,maxc){
  s=sanitize(s); const budget=maxc*FW;
  const words=s.split(' '), out=[]; let line='';
  for(const w of words){
    const cand=line+(line?' ':'')+w;
    if(tw(cand)<=budget) line=cand;
    else{ if(line) out.push(line);
      if(tw(w)>budget){ let r=w;
        while(tw(r)>budget){ let cut=r.length; while(cut>1&&tw(r.slice(0,cut))>budget) cut--; out.push(r.slice(0,cut)); r=r.slice(cut); }
        line=r; }
      else line=w; }
  }
  if(line) out.push(line); return out;
}
function paginate(s,chars,lines){ chars=chars||33; lines=lines||4;
  const L=wrap(s,chars), pages=[];
  for(let i=0;i<L.length;i+=lines) pages.push(L.slice(i,i+lines));
  return pages;
}

const Audio={
  ctx:null, master:null, muted:true, mood:null, step:0, next:0, timer:null, transpose:0,
  ensure(){
    if(this.ctx){ if(this.ctx.state==='suspended') this.ctx.resume(); return; }
    try{
      this.ctx=new (window.AudioContext||window.webkitAudioContext)();
      this.master=this.ctx.createGain();
      this.master.gain.value=this.muted?0:0.35;
      this.master.connect(this.ctx.destination);
      this.timer=setInterval(()=>this.tick(),40);
    }catch(e){}
  },
  setMuted(m){ this.muted=m; if(this.master) this.master.gain.value=m?0:0.35; },
  f(midi){ return 440*Math.pow(2,(midi-69)/12); },
  osc(type,midi,t,dur,vol,slide){
    if(!this.ctx) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(this.f(midi),t);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20,this.f(midi+slide)),t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+0.02);
  },
  noise(t,dur,vol){
    if(!this.ctx) return;
    const n=Math.floor(this.ctx.sampleRate*dur), b=this.ctx.createBuffer(1,n,this.ctx.sampleRate);
    const d=b.getChannelData(0); for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s=this.ctx.createBufferSource(), g=this.ctx.createGain();
    s.buffer=b; g.gain.value=vol; s.connect(g); g.connect(this.master); s.start(t);
  },
  MOODS:{
    title:{bpm:96, bass:[36,0,0,0,43,0,0,0,41,0,0,0,43,0,0,0],
           lead:[60,64,67,72,71,67,64,60,62,65,69,74,72,69,65,62],hat:[0,0,1,0]},
    explore:{bpm:138, bass:[36,0,43,0,36,0,43,0,41,0,48,0,38,0,45,0],
           lead:[60,0,64,67,0,64,60,0,62,0,65,69,0,65,62,0,64,0,67,71,0,67,64,0,60,0,64,0,67,0,72,0],hat:[1,0,1,1]},
    boss:{bpm:150, bass:[33,33,0,33,33,0,36,36,31,31,0,31,31,0,32,32],
           lead:[57,0,60,57,63,0,62,60,57,0,60,57,55,0,56,57,0,0,63,62,60,0,57,0,53,0,55,56,57,0,0,0],hat:[1,1,0,1]},
    victory:{bpm:120, bass:[36,0,43,0,41,0,43,0,36,0,43,0,48,0,43,0],
           lead:[72,0,72,0,72,76,79,0,76,0,79,0,84,0,79,76,77,0,77,0,77,81,84,0,79,0,76,0,72,0,0,0],hat:[1,0,1,0]}
  },
  setMood(m,transpose){ this.mood=m; this.transpose=transpose||0; this.step=0; if(this.ctx) this.next=this.ctx.currentTime+0.05; },
  tick(){
    if(!this.ctx||!this.mood) return;
    const M=this.MOODS[this.mood]; if(!M) return;
    const spb=60/M.bpm/2; // 8th note
    while(this.next<this.ctx.currentTime+0.12){
      const t=this.next, s=this.step;
      const b=M.bass[s%M.bass.length];
      if(b) this.osc('triangle',b+this.transpose,t,spb*0.9,0.30);
      const l1=M.lead[(s*2)%M.lead.length], l2=M.lead[(s*2+1)%M.lead.length];
      if(l1) this.osc('square',l1+this.transpose,t,spb*0.42,0.11);
      if(l2) this.osc('square',l2+this.transpose,t+spb/2,spb*0.42,0.11);
      if(M.hat[s%M.hat.length]) this.noise(t,0.03,0.05);
      this.next+=spb; this.step++;
    }
  },
  sfx(name){
    if(!this.ctx) return; const t=this.ctx.currentTime;
    switch(name){
      case 'select': this.osc('square',88,t,0.06,0.2); break;
      case 'key': this.osc('square',81,t,0.07,0.2); this.osc('square',88,t+0.08,0.12,0.2); break;
      case 'door': this.osc('square',48,t,0.3,0.2,12); this.noise(t+0.05,0.2,0.15); break;
      case 'stone': [76,80,83,88].forEach((n,i)=>this.osc('square',n,t+i*0.09,0.22,0.18)); break;
      case 'correct': [72,76,79,84].forEach((n,i)=>this.osc('square',n,t+i*0.06,0.12,0.2)); break;
      case 'wrong': this.osc('square',45,t,0.25,0.22,-5); break;
      case 'hit': this.noise(t,0.15,0.3); this.osc('square',38,t,0.18,0.3,-10); break;
      case 'hurt': this.osc('sawtooth',50,t,0.3,0.25,-14); this.noise(t,0.25,0.25); break;
      case 'blip': this.osc('square',95,t,0.04,0.12); break;
      case 'jingle': [72,76,79,84,88,91,96].forEach((n,i)=>this.osc('square',n,t+i*0.1,0.25,0.18)); break;
    }
  }
};

  ctx.fillStyle='#241a14';
  ctx.fillRect(x+1,y-1,12,4); ctx.fillRect(x,y,2,7); ctx.fillRect(x+12,y,2,7);

function drawKeyIcon(x,y,c){

function drawStoneIcon(x,y,c,on,big){
  const s=big?3:1;

  ctx.beginPath();

  if(on){ ctx.fillStyle='#ffffff90'; ctx.fillRect(x+2*s,y+2*s,s,s*2); }

/* hexapod boss sprite */
function drawHexapod(x,y,t,dead){
  const bobY=dead?6:Math.sin(t/14)*2;
  x=Math.round(x); y=Math.round(y+bobY);
  ctx.fillStyle='#c8ccd4';
  for(let i=0;i<3;i++){
    const ly=y+4+i*10, sp=dead?4+i*3:Math.sin(t/9+i)*3;
    ctx.fillRect(x-22,ly+sp,20,3); ctx.fillRect(x-30,ly+sp+3,8,3);
    ctx.fillRect(x+22,ly-sp,20,3); ctx.fillRect(x+42,ly-sp+3,8,3);
    ctx.fillStyle=i%2?'#d04038':'#4050c8';
    ctx.fillRect(x-18,ly+sp-2,6,6); ctx.fillRect(x+14,ly-sp-2,6,6);
    ctx.fillStyle='#c8ccd4';
  }
  ctx.fillStyle='#1c1c24'; ctx.fillRect(x-14,y,30,26);
  ctx.fillStyle='#2c2c38'; ctx.fillRect(x-11,y+3,24,20);
  ctx.fillStyle='#3fbf5f'; ctx.fillRect(x-8,y+5,12,4);
  ctx.fillStyle='#888e98'; ctx.fillRect(x-3,y-7,8,8);
  ctx.fillStyle=dead?'#444':'#ff4040'; ctx.fillRect(x-1,y-5,3,3);
  if(!dead){ ctx.fillStyle='#d04038'; ctx.fillRect(x-14+((t>>3)%28),y+26,3,2); }
}

/* ============================== DIALOG =================================== */
function say(pages,opts){
  opts=opts||{};
  pages=pages.map(p=>typeof p==='string'?{lines:wrap(p,33).slice(0,4)}:p);
  G.dialog={pages,i:0,reveal:0,opts};
  Audio.sfx('blip');
}
function sayText(str,opts){ say(paginate(str,33,4).map(l=>({lines:l})),opts); }
function dialogInteract(){
  const d=G.dialog, p=d.pages[d.i];
  const tot=p.lines.join(' ').length;
  if(d.reveal<tot){ d.reveal=tot; return; }
  d.i++; d.reveal=0;
  if(d.i>=d.pages.length){ G.dialog=null; if(d.opts.done) d.opts.done(); }
  else{ const np=d.pages[d.i]; if(np.style==='key') Audio.sfx('key'); else Audio.sfx('blip'); }
}
function drawDialog(){
  const d=G.dialog, p=d.pages[d.i];
  d.reveal=Math.min(d.reveal+2, p.lines.join(' ').length);
  // header
  if(d.opts.header){
    const h=sanitize(d.opts.header).slice(0,40);
    ctx.fillStyle='#000000c0'; ctx.fillRect(2,158,h.length*6+8,12);
    text(h,6,158,d.opts.hc||'#ffd028');
  }
  ctx.fillStyle='#101020'; ctx.fillRect(2,172,252,66);
  ctx.strokeStyle='#e8e0c8'; ctx.lineWidth=2; ctx.strokeRect(4,174,248,62);
  let tx=12, ty=180;
  if(d.opts.portrait!==false){ drawPortrait(9,187); tx=48; }
  if(p.style==='key'){
    drawKeyIcon(tx,ty+2,'#ffd028'); text('KEY GET! Skill unlocked:',tx+14,ty,'#ffd028');
    let rem=d.reveal, y=ty+14;
    for(const ln of p.lines){ text(ln.slice(0,Math.max(0,rem)),tx,y,'#fff'); rem-=ln.length+1; y+=12; }
  }else{
    if(p.style==='fact'){ text('* FUN FACT *',tx,ty,'#ffd028'); ty+=12; }
    let rem=d.reveal;
    for(const ln of p.lines){ text(ln.slice(0,Math.max(0,rem)),tx,ty,p.style==='fact'?'#ffe9a0':'#ffffff'); rem-=ln.length+1; ty+=12; }
  }
  if(d.reveal>=p.lines.join(' ').length && (G.t>>4)%2) text('v',242,226,'#ffd028');
}

const PV={

/* ============================== ROOM LAYOUTS ============================= */
function boothSpots(n){
  if(n<=6) return [[40,80],[128,78],[216,80],[36,144],[220,144],[128,186]];
  return [[42,78],[128,78],[214,78],[42,128],[128,128],[214,128],[42,178],[128,178],[214,178]];
}
function roomObjects(){
  const lv=curLv(), spots=boothSpots(lv.booths.length), obj=[];
  lv.booths.forEach((b,i)=>obj.push({type:'booth',b,x:spots[i][0]-11,y:spots[i][1]-8,w:22,h:16,i}));
  obj.push({type:'banner',x:196,y:34,w:26,h:16});
  obj.push({type:'door',x:112,y:30,w:32,h:20});
  return obj;
}
let ROOM=[];
function enterRoom(i){
  G.level=i; G.mode='room'; G.doorOpen=false; G.doorMsg=false;
  curLv().booths.forEach(b=>b.got=false);
  ROOM=roomObjects();
  G.px=124; G.py=200; G.dir=1;
  Audio.setMood('explore',[0,-3,2,-5,4][i]);
}
function keysGot(){ return curLv().booths.filter(b=>b.got).length; }

/* ============================== ROOM SCENE =============================== */
function nearObject(){
  let best=null,bd=1e9;
  for(const o of ROOM){
    const cx=o.x+o.w/2, cy=o.y+o.h/2;
    const d=Math.abs(G.px+7-cx)+Math.abs(G.py+8-cy);
    if(d<34&&d<bd){bd=d;best=o;}
  }
  return best;
}
function collide(nx,ny){
  const px1=nx+1,py1=ny+8,px2=nx+13,py2=ny+17;
  for(const o of ROOM){
    if(o.type==='door') continue;
    if(px1<o.x+o.w&&px2>o.x&&py1<o.y+o.h&&py2>o.y) return true;
  }
  return false;
}
function openBooth(b){
  const pages=paginate(b.t,33,4).map(l=>({lines:l}));
  pages.push({style:'key',lines:wrap(b.k,33).slice(0,3)});
  if(b.f) paginate(b.f,33,3).forEach(l=>pages.push({style:'fact',lines:l}));
  say(pages,{header:b.n,hc:curLv().pal.acc,done:()=>{
    const first=!b.got; b.got=true;
    if(b.img) PV.show(imgList(b.img), b.n, 'Real build - from my project archive.');
    if(first && keysGot()===curLv().booths.length){
      G.doorOpen=true; Audio.sfx('door');
      setTimeout(()=>{ if(G.mode==='room'&&!G.dialog) sayText('All keys collected! The door rumbles open. Head through when ready.',{}); },350);
    }
  }});
}
function openBanner(){
  const lv=curLv();
  const pages=[{lines:['HONORABLE MENTIONS - also studied:']}];
  const items=lv.mentions.map(m=>'* '+m);
  for(let i=0;i<items.length;i+=3){
    pages.push({lines:items.slice(i,i+3).map(s=>sanitize(s).slice(0,33))});
  }
  say(pages,{header:'Honorable Mentions',hc:lv.pal.acc,portrait:false});
}
function tryDoor(){
  if(!G.doorOpen){
    sayText('Locked. Collect all '+curLv().booths.length+' course keys first. ('+keysGot()+'/'+curLv().booths.length+')',{portrait:false});
    return;
  }
  const lv=curLv();
  if(lv.quiz) startQuiz();
  else startStone();
}
function updateRoom(){
  if(G.dialog){ if(interactQueued){interactQueued=false; dialogInteract();} return; }
  if(PV.open){ if(interactQueued){interactQueued=false; PV.close();} return; }
  const sp=1.3; let nx=G.px, ny=G.py, moving=false;
  if(Keys.l){nx-=sp;G.dir=2;moving=true;} if(Keys.r){nx+=sp;G.dir=3;moving=true;}
  if(!collide(nx,G.py)) G.px=Math.max(6,Math.min(236,nx));
  if(Keys.u){ny-=sp;G.dir=1;moving=true;} if(Keys.d){ny+=sp;G.dir=0;moving=true;}
  if(!collide(G.px,ny)) G.py=Math.max(46,Math.min(218,ny));
  if(moving) G.walk+=0.18; else G.walk=0;
  // walking into open door
  const d=ROOM.find(o=>o.type==='door');
  if(G.doorOpen && G.px+7>d.x+4 && G.px+7<d.x+d.w-4 && G.py<52){ tryDoor(); G.py=56; return; }
  if(interactQueued){
    interactQueued=false;
    const o=nearObject();
    if(o){ if(o.type==='booth') openBooth(o.b); else if(o.type==='banner') openBanner(); else if(o.type==='door') tryDoor(); }
  }
}

      ctx.moveTo(x,16); ctx.lineTo(x+16,16); ctx.lineTo(x+8,28); ctx.closePath(); ctx.fill(); }

      ctx.beginPath(); ctx.arc(x+1,y+1,r-1,0,7); ctx.fill(); ctx.fillStyle='#3a4049'; ctx.fillRect(x-1,y-1,4,4); };
    g(30,28,8); g(52,24,6); g(226,28,8);

  }
  if(yr===2){ // terminal screens + robot silhouette

      ctx.fillStyle='#4cff7a'; for(let l=0;l<4;l++) ctx.fillRect(x+2,23+l*4,4+((G.t>>3)+l*5+i*7)%16,2); }
    ctx.fillStyle='#061826'; ctx.fillRect(196,18,26,24);
    ctx.fillStyle='#0c2c44'; ctx.fillRect(202,22,14,10); ctx.fillRect(199,32,20,8);
    ctx.fillStyle='#33e0d8'; ctx.fillRect(205,25,3,3); ctx.fillRect(211,25,3,3);
  }
  if(yr===3){ // warning tape + red lamp + clutter
    for(let x=0;x<W;x+=12){ ctx.fillStyle=(x/12%2)?'#ffd028':'#181018'; ctx.beginPath();
      ctx.moveTo(x,40); ctx.lineTo(x+12,40); ctx.lineTo(x+6,46); ctx.lineTo(x-6,46); ctx.closePath(); ctx.fill(); }
    const on=(G.t>>4)%2; ctx.fillStyle=on?'#ff3838':'#5a1414'; ctx.fillRect(122,17,12,8);
    if(on){ ctx.fillStyle='#ff383830'; ctx.fillRect(104,14,48,32); }
    ctx.fillStyle='#e8e0c8'; ctx.fillRect(60,56,10,6); ctx.fillRect(180,60,8,5); // scattered papers
    ctx.fillStyle='#d0c8b0'; ctx.fillRect(63,58,10,6);
  }
  if(yr===4){ // twilight->dawn spotlight + banners + stage

function drawCard(){
  const lv=LEVELS[G.level], p=lv.pal; G.cardT++;
  ctx.fillStyle=p.bg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=p.wallD; ctx.fillRect(0,70,W,4); ctx.fillRect(0,166,W,4);
  textC('YEAR '+lv.yr,128,90,p.ink,2);
  let y=118; for(const ln of wrap(lv.card,36)){ textC(ln,128,y,p.ink); y+=13; }
  if(G.cardT>30&&(G.t>>4)%2) textC('- press to enter -',128,180,p.acc);
  if(interactQueued){ interactQueued=false; if(G.cardT>15) enterRoom(G.level); }
}

/* ============================== QUIZ ===================================== */
function startQuiz(){ G.mode='quiz'; G.quizSel=0; G.quizStage=0; Audio.sfx('select'); }
function drawQuiz(){
  const lv=curLv(), qz=lv.quiz, p=lv.pal;
  ctx.fillStyle='#0c1024'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=p.acc; ctx.fillRect(0,0,W,3); ctx.fillRect(0,H-3,W,3);
  textC('BRANCH QUIZ '+(lv.yr+1),128,14,p.acc);
  let y=34; for(const ln of wrap(qz.setup,38)){ textC(ln,128,y,'#c8c8d8'); y+=12; }
  y+=6; for(const ln of wrap(qz.q,36)){ textC(ln,128,y,'#fff'); y+=13; }
  y+=8;
  if(G.dialog){ if(interactQueued){interactQueued=false; dialogInteract();} }
  else{
    qz.opts.forEach((o,i)=>{
      const sel=i===G.quizSel;
      if(sel){ ctx.fillStyle=p.acc+'30'; ctx.fillRect(58,y-2,140,14); text('>',62,y,p.acc); }
      textC(o,128,y,sel?'#fff':'#9090a8'); y+=17;
    });
    if(navQueued==='u'){ G.quizSel=(G.quizSel+3)%4; Audio.sfx('select'); }
    if(navQueued==='d'){ G.quizSel=(G.quizSel+1)%4; Audio.sfx('select'); }
    if(interactQueued){
      interactQueued=false;
      if(G.quizSel===qz.correct){
        Audio.sfx('correct');
        sayText(qz.right,{done:()=>startStone()});
      }else{
        Audio.sfx('wrong');
        const j=qz.jokes[G.quizSel>qz.correct?G.quizSel-1:G.quizSel]||qz.jokes[0];
        sayText(j,{});
      }
    }
  }
  if(G.dialog) drawDialog();
}

/* ============================== STONE CEREMONY =========================== */
function startStone(){ G.mode='stone'; G.stoneT=0; Audio.sfx('stone'); }
function drawStone(){
  const i=G.level, st=STONES[i]; G.stoneT++;
  ctx.fillStyle='#08080e'; ctx.fillRect(0,0,W,H);
  const gl=Math.sin(G.t/8)*0.3+0.7;
  ctx.globalAlpha=gl*0.25; ctx.fillStyle=st.c;
  ctx.beginPath(); ctx.arc(128,92,46+Math.sin(G.t/10)*4,0,7); ctx.fill(); ctx.globalAlpha=1;
  drawStoneIcon(116,78,st.c,true,3);
  textC(st.n+' STONE',128,120,st.c,1);
  let y=140; for(const ln of wrap(st.line,36)){ textC(ln,128,y,'#e8e0c8'); y+=12; }
  for(let k=0;k<5;k++) drawStoneIcon(98+k*14,190,STONES[k].c, k<i||G.stones[k]||k===i&&G.stoneT>20);
  if(G.stoneT===20){ G.stones[i]=true; }
  if(G.stoneT>40&&(G.t>>4)%2) textC('- press -',128,214,'#8890b8');
  if(interactQueued){ interactQueued=false; if(G.stoneT>25){ startCard(i+1); } }
}

/* ============================== BOSS FIGHT =============================== */
function startBoss(){
  G.mode='boss'; Audio.setMood('boss');
  G.boss={i:-1,php:100,bhp:100,anim:0,animT:0,prompt:false,word:null,callout:null,calloutC:'#fff',dead:false,laptop:false};
  nextBossStep();
}
function nextBossStep(){
  const B=G.boss; B.i++;
  if(B.i>=BOSS_SCRIPT.length){ startVictory(); return; }
  const s=BOSS_SCRIPT[B.i];
  B.prompt=false; B.word=null;
  if(s.t==='line') sayText(s.s,{done:()=>nextBossStep()});
  else if(s.t==='laptop'){ B.laptop=true; sayText(s.s,{done:()=>nextBossStep()}); }
  else if(s.t==='attack'){ B.anim='attack'; B.animT=0; }
  else if(s.t==='hit'||s.t==='word'){ B.prompt=true; }
  else if(s.t==='ko'){ B.anim='ko'; B.animT=0; }
}
function updateBoss(){
  const B=G.boss;
  if(G.dialog){ if(interactQueued){interactQueued=false; dialogInteract();} return; }
  const s=BOSS_SCRIPT[B.i]||{};
  if(B.anim==='attack'){
    B.animT++;
    if(B.animT===40){ Audio.sfx('hurt'); G.shake=14; }
    if(B.animT>40&&B.animT<75) B.php=Math.max(28,B.php-3);
    if(B.animT>90){ B.anim=0; nextBossStep(); }
  }
  else if(B.anim==='ko'){
    B.animT++;
    if(B.animT===10){ Audio.sfx('hit'); G.shake=18; B.bhp=0; }
    if(B.animT===40){ B.dead=true; Audio.sfx('jingle'); }
    if(B.animT>110){ startVictory(); }
  }
  else if(B.prompt&&interactQueued){
    interactQueued=false;
    if(s.t==='hit'){
      const st=STONES[s.stone];
      Audio.sfx('hit'); G.shake=10; G.flash={c:st.c,t:12};
      B.bhp=Math.max(20,B.bhp-16);
      B.callout=s.s; B.calloutC=st.c; B.calloutT=0; B.prompt=false;
      setTimeout(()=>{ if(G.mode==='boss') nextBossStep(); },900);
    }else{ // word
      Audio.sfx('hit'); G.shake=8; B.word=s.s; B.prompt=false;
      setTimeout(()=>{ if(G.mode==='boss') nextBossStep(); },800);
    }
  }
  else if(interactQueued) interactQueued=false;
}
function drawBoss(){
  const B=G.boss;
  ctx.fillStyle='#12081c'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1e0e2e'; ctx.fillRect(0,170,W,70);
  ctx.fillStyle='#2a1440'; for(let x=0;x<W;x+=24) ctx.fillRect(x,170,12,4);
  for(let i=0;i<24;i++){ ctx.fillStyle='#241238'; ctx.fillRect((i*67)%W,(i*41)%150+10,2,2); }
  // hexapod
  let bx=170, by=120;
  if(B.anim==='attack'&&B.animT>25&&B.animT<55) bx-=Math.sin((B.animT-25)/30*Math.PI)*70;
  drawHexapod(bx,by,G.t,B.dead);
  if(B.dead&&(G.t>>3)%3===0){ ctx.fillStyle='#ffd028'; ctx.fillRect(bx-10+((G.t*7)%30),by-14,3,3); }
  // player
  const hurtK=(B.anim==='attack'&&B.animT>38&&B.animT<60);
  drawPlayer(46,hurtK?162:156,3,Math.floor(G.t/10)%2);
  if(B.laptop){ ctx.fillStyle='#888e98'; ctx.fillRect(66,168,16,3); ctx.fillStyle='#33e0d8'; ctx.fillRect(67,160,14,8);
    for(let k=0;k<5;k++) if(G.stones[k]) drawStoneIcon(64+k*4,150-Math.abs(Math.sin(G.t/10+k))*4,STONES[k].c); }
  // health bars
  const bar=(x,label,hp,c)=>{ text(label,x,4,'#fff');
    ctx.fillStyle='#333'; ctx.fillRect(x,16,90,7);
    ctx.fillStyle=c; ctx.fillRect(x+1,17,Math.round(hp*0.88),5);
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(x+0.5,16.5,90,7); };
  bar(8,'EN-G-INEER',B.php,'#3fbf5f'); bar(158,'HEXAPOD',B.bhp,'#ff3838');
  // callout / word / prompt
  if(B.callout){ B.calloutT=(B.calloutT||0)+1;
    let y=46; for(const ln of wrap(B.callout,34)){ textC(ln,128,y,B.calloutC); y+=12; }
    if(B.calloutT>70) B.callout=null; }
  if(B.word) textC(B.word,128,86,'#ffd028',2);
  if(B.prompt&&(G.t>>3)%2){
    const s=BOSS_SCRIPT[B.i];
    textC(s.t==='hit'?('PRESS! - '+STONES[s.stone].n+' STONE'):'PRESS!',128,206,'#ffd028');
  }
  if(G.dialog) drawDialog();
}

/* ============================== VICTORY ================================== */
function startVictory(){ G.mode='victory'; G.vt=0; Audio.setMood('victory'); }
function drawVictory(){
  G.vt++;
  ctx.fillStyle='#100c22'; ctx.fillRect(0,0,W,H);
  if((G.vt%20)<10){ for(let i=0;i<30;i++){ ctx.fillStyle=['#ffd028','#35d0e0','#e040c0','#3fbf5f'][i%4];
    ctx.fillRect((i*89+G.vt*2)%W,(i*53+G.vt)%H,2,2); } }
  textC('EN-G-INEER: COMPLETE.',128,52,'#ffd028',1);
  const L=['Graduation Project: A+','Cohort rank: 9 of 93','GPA 3.31 / 4.00','Status: Mechatronics Engineer'];
  L.forEach((s,i)=>{ if(G.vt>30+i*22) textC(s,128,86+i*16,'#e8e0c8'); });
  for(let k=0;k<5;k++) drawStoneIcon(98+k*14,160,STONES[k].c,true);
  if(G.vt>130&&(G.t>>4)%2) textC('> ENTER THE TROPHY GALLERY <',128,196,'#35d0e0');
  if(interactQueued){ interactQueued=false; if(G.vt>60) enterGallery(); }
}

/* ============================== GALLERY ================================== */
let GROOM=[];
function enterGallery(){
  G.mode='gallery'; Audio.setMood('victory');
  const top=[[40,86],[98,86],[156,86],[214,86]], bot=[[68,152],[128,152],[188,152]];
  GROOM=GALLERY.map((g,i)=>{ const s=i<4?top[i]:bot[i-4];
    return {type:'ped',g,x:s[0]-10,y:s[1]-8,w:20,h:16,i}; });
  GROOM.push({type:'exit',x:108,y:216,w:40,h:18});
  G.px=124; G.py=110; G.dir=0;
  if(!G.galIntroDone){ G.galIntroDone=true;
    sayText('Welcome to the trophy hall. Every project I built, still standing. Take a look around - approach any piece to see the real thing.',{}); }
}
function updateGallery(){
  if(G.dialog){ if(interactQueued){interactQueued=false; dialogInteract();} return; }
  if(PV.open){ if(interactQueued){interactQueued=false; PV.close();} return; }
  const sp=1.3; let nx=G.px, ny=G.py, moving=false;
  if(Keys.l){nx-=sp;G.dir=2;moving=true;} if(Keys.r){nx+=sp;G.dir=3;moving=true;}
  if(!gcollide(nx,G.py)) G.px=Math.max(6,Math.min(236,nx));
  if(Keys.u){ny-=sp;G.dir=1;moving=true;} if(Keys.d){ny+=sp;G.dir=0;moving=true;}
  if(!gcollide(G.px,ny)) G.py=Math.max(46,Math.min(218,ny));
  if(moving) G.walk+=0.18; else G.walk=0;
  if(G.py>210&&G.px>100&&G.px<142){ startHireMe(); return; }
  if(interactQueued){
    interactQueued=false;
    const o=gnear();
    if(o){ if(o.type==='ped') PV.show(imgList(o.g.img),o.g.n,o.g.hook); else startHireMe(); }
  }
}
function gcollide(nx,ny){
  const px1=nx+1,py1=ny+8,px2=nx+13,py2=ny+17;
  for(const o of GROOM){ if(o.type==='exit') continue;
    if(px1<o.x+o.w&&px2>o.x&&py1<o.y+o.h&&py2>o.y) return true; }
  return false;
}
function gnear(){
  let best=null,bd=1e9;
  for(const o of GROOM){ const d=Math.abs(G.px+7-(o.x+o.w/2))+Math.abs(G.py+8-(o.y+o.h/2));
    if(d<34&&d<bd){bd=d;best=o;} }
  return best;
}
function drawGallery(){
  ctx.fillStyle='#262630'; ctx.fillRect(0,46,W,H-46);
  ctx.fillStyle='#20202a'; for(let y=46;y<H;y+=16)for(let x=(y/16%2)?0:16;x<W;x+=32) ctx.fillRect(x,y,16,16);
  ctx.fillStyle='#181820'; ctx.fillRect(0,14,W,32); ctx.fillStyle='#101018'; ctx.fillRect(0,42,W,4);
  textC('* TROPHY GALLERY *',128,24,'#e8c832');
  for(const o of GROOM){
    if(o.type==='ped'){
      ctx.fillStyle='#00000040'; ctx.fillRect(o.x+1,o.y+o.h-2,o.w,3);
      ctx.fillStyle='#5a5a6a'; ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.fillStyle='#73738a'; ctx.fillRect(o.x,o.y,o.w,3);
      ctx.fillStyle='#e8c832'; ctx.fillRect(o.x+4,o.y-8,12,9);
      ctx.fillStyle='#8a6a10'; ctx.fillRect(o.x+6,o.y-6,8,5);
      ctx.fillStyle='#3a3a48'; ctx.fillRect(o.x+2,o.y+6,o.w-4,5); // plaque
    }else{
      ctx.fillStyle='#101018'; ctx.fillRect(o.x,o.y,o.w,o.h);
      textC('EXIT v',o.x+o.w/2,o.y+4,'#e8c832');
    }
  }
  drawPlayer(G.px,G.py,G.dir,Math.floor(G.walk));
  ctx.fillStyle='#0a0a12'; ctx.fillRect(0,0,W,14);
  for(let i=0;i<5;i++) drawStoneIcon(150+i*14,2,STONES[i].c,G.stones[i]);
  text('GALLERY',4,1,'#e8c832');
  if(!G.dialog&&!PV.open){
    const o=gnear();
    if(o){ let label=o.type==='ped'?o.g.n:'Leave the hall (Hire me!)';
      label=sanitize(label); if(label.length>36) label=label.slice(0,35)+'.';
      ctx.fillStyle='#000000b8'; ctx.fillRect(0,228,W,12);
      textC('ACT: '+label,128,228,'#e8c832'); }
  }
  if(G.dialog) drawDialog();
}

/* ============================== HIRE ME ================================== */
const ctaEl=document.getElementById('cta');
function startHireMe(){ G.mode='hireme'; G.ht=0; Audio.setMood('title'); }
function positionCta(){
  const r=cv.getBoundingClientRect();
  ctaEl.style.left=(r.left+r.width/2-125)+'px';
  ctaEl.style.top=(r.top+r.height*0.52)+'px';
}
function drawHireMe(){
  G.ht=(G.ht||0)+1;
  ctx.fillStyle='#0c1024'; ctx.fillRect(0,0,W,H);
  for(let i=0;i<30;i++){ ctx.fillStyle='#161c38'; ctx.fillRect((i*71)%W,(i*47)%H,2,2); }
  let y=18;
  for(const ln of wrap("That's my five years. If you'd like the sequel - the one where I build things for your team - let's talk.",36)){ textC(ln,128,y,'#e8e0c8'); y+=12; }
  textC("HIRE ME.",128,y+8,'#ffd028',2);
  textC("I'm creative, and I work hard.",128,y+30,'#35d0e0');
  textC('george7megally@gmail.com',128,H-24,'#8890b8');
  textC('linkedin.com/in/george-megally-girgis',128,H-12,'#8890b8');
  ctaEl.classList.add('open'); positionCta();
}
document.getElementById('ctaCv').addEventListener('click',()=>{
  const list=(ASSETS.cv&&ASSETS.cv.length)?ASSETS.cv.slice():[placeholder('cv page')];
  PV.show(list,'MY CV - GEORGE MEGALLY GIRGIS','Mechatronics Engineer * Dublin, Ireland * george7megally@gmail.com');
});
document.getElementById('ctaAgain').addEventListener('click',()=>location.reload());

/* ============================== SKIP / LOOP ============================== */
document.getElementById('skipBtn').addEventListener('click',()=>{
  Audio.ensure(); G.dialog=null; PV.close(); enterGallery();
});
function frame(){
  requestAnimationFrame(frame);
  G.t++;
  if(!faceReady) bakeFace();
  if(G.mode!=='hireme') ctaEl.classList.remove('open');
  // update+draw
  ctx.save();
  if(G.shake>0){ G.shake--; ctx.translate((Math.random()*6-3)|0,(Math.random()*6-3)|0); }
  switch(G.mode){
    case 'title': drawTitle(); break;
    case 'intro': drawIntro(); break;
    case 'card': drawCard(); break;
    case 'room': updateRoom(); if(G.mode==='room') drawRoom(); break;
    case 'quiz': drawQuiz(); break;
    case 'stone': drawStone(); break;
    case 'boss': updateBoss(); if(G.mode==='boss') drawBoss(); break;
    case 'victory': drawVictory(); break;
    case 'gallery': updateGallery(); if(G.mode==='gallery') drawGallery(); break;
    case 'hireme': drawHireMe(); break;
  }
  ctx.restore();
  if(G.flash){ ctx.globalAlpha=G.flash.t/12*0.5; ctx.fillStyle=G.flash.c;
    ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; if(--G.flash.t<=0) G.flash=null; }
  navQueued=null;
  if(interactQueued && (G.mode==='title'||G.mode==='hireme')) interactQueued=false;
}
let started=false;
function start(){ if(started) return; started=true; fit(); frame(); }
fontImg.onload=start;
if(fontImg.complete&&fontImg.naturalWidth) start();
fit();

</script>
